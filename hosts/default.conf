# hosts/default.conf — template for new machines.
#
# Copy to hosts/$(hostname -s).conf and enable modules as desired.
# Unknown hosts (no file present) install the baseline only.
#
# Available brew modules:
#   desktop    yabai, skhd-zig, cliclick, karabiner (macOS tiling + input)
#   ai         llama.cpp, mlx-lm, mistral-vibe, chatgpt, python@3.14
#   streaming  obs, plex, parsec, elgato-stream-deck, elgato-wave-link
#   chat       discord, telegram (beyond baseline signal)
#   iwork      MAS iMovie, Keynote, Numbers, Pages, Xcode
#   misc       sops, brave-browser

BREW_MODULES=()
