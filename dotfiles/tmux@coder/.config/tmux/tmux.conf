set -s extended-keys off

# Runs nested inside a local tmux: C-b controls the remote instance while
# unprefixed hotkeys fall through to the outer instance.
unbind -a -T root
set -g prefix C-b
set -g prefix2 None
bind C-b send-prefix

# The blanket unbind above also drops tmux's default mouse bindings; without
# them "mouse on" swallows every event and TUIs (codex, nvim) get no mouse.
bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e"
bind -T root WheelDownPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" ""
bind -T root MouseDown1Pane select-pane -t = \; send-keys -M
bind -T root MouseDown3Pane select-pane -t = \; send-keys -M
bind -T root MouseDown1Status select-window -t =
bind -T root MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind -T root MouseDrag1Border resize-pane -M

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Vi mode for copy (mouse scroll still enters copy-mode)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane
bind t select-layout tiled

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 2
set -g status-left-length 30
set -g status-right-length 100
set -g window-status-separator ""
set -g automatic-rename on
set -g allow-rename on
set -g set-titles off
set -g automatic-rename-format '#{?#{==:#{pane_current_command},ssh},#{pane_title},#{b:pane_current_path}}'

# Theme: tokyonight-night (matches nvim folke/tokyonight.nvim and ghostty)
# bg=#1a1b26 bg_dark=#16161e fg=#c0caf5 blue=#7aa2f7 cyan=#7dcfff
# magenta=#bb9af7 comment=#565f89 term_black=#414868 yellow=#e0af68 red=#f7768e
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #(echo \"\${CODER_WORKSPACE_NAME:-#S}\") #[fg=#7aa2f7,bg=#16161e,nobold] "
set -g status-right "#[fg=#7aa2f7]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#(sh ~/.config/tmux/status-resources #S) #[fg=#565f89]#h "
set -g window-status-format "#[fg=#565f89,bg=#16161e] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bg=#16161e,bold] #I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#16161e,fg=#7aa2f7"
set -g message-command-style "bg=#16161e,fg=#7aa2f7"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
setw -g clock-mode-colour "#7aa2f7"
