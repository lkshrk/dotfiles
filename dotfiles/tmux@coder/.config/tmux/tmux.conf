# Runs nested inside a local tmux: no prefix, no root-table binds,
# so every hotkey falls through to the outer instance
unbind -a -T prefix
unbind -a -T root
set -g prefix None

# Vi mode for copy (mouse scroll still enters copy-mode)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -g automatic-rename on
set -g allow-rename on
set -g set-titles off
set -g automatic-rename-format '#{?#{==:#{pane_current_command},ssh},#{pane_title},#{b:pane_current_path}}'

# Theme: tokyonight-night (matches nvim folke/tokyonight.nvim and ghostty)
# bg=#1a1b26 bg_dark=#16161e fg=#c0caf5 blue=#7aa2f7 cyan=#7dcfff
# magenta=#bb9af7 comment=#565f89 term_black=#414868 yellow=#e0af68 red=#f7768e
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #(printf '%s' \"\${CODER_WORKSPACE_NAME:-#S}\") #[fg=#7aa2f7,bg=#16161e,nobold] "
set -g status-right "#[fg=#7aa2f7]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#565f89]#h "
set -g window-status-format "#[fg=#565f89,bg=#16161e] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bg=#16161e,bold] #I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#16161e,fg=#7aa2f7"
set -g message-command-style "bg=#16161e,fg=#7aa2f7"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
setw -g clock-mode-colour "#7aa2f7"
