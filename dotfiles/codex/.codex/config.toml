model_auto_compact_token_limit = 840_000
model_auto_compact_token_limit_scope = "body_after_prefix"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
show_raw_agent_reasoning = true
# Coder's SSH pre-connect hook refreshes auth.json in the persistent workspace
# home, so credentials must stay file-backed.
cli_auth_credentials_store = "file"
approvals_reviewer = "user"
approval_policy = "never"
sandbox_mode = "workspace-write"
default_permissions = "signed"
model = "gpt-5.6-sol"

[permissions.signed]
extends = ":workspace"

[permissions.signed.filesystem.":workspace_roots"]
".git/" = "write"

[permissions.signed.network]
enabled = true
dangerously_allow_all_unix_sockets = true

[agents]
max_threads = 6
max_depth = 2

[otel]
environment = "dev"
log_user_prompt = true

[otel.exporter.otlp-http]
endpoint = "https://otel.h-cloud.lan/v1/logs"
protocol = "binary"

[otel.exporter.otlp-http.tls]
ca-certificate = "/Users/lkshrk/.local/share/certs/lan-ca.pem"

[otel.trace_exporter.otlp-http]
endpoint = "https://otel.h-cloud.lan/v1/traces"
protocol = "binary"

[otel.trace_exporter.otlp-http.tls]
ca-certificate = "/Users/lkshrk/.local/share/certs/lan-ca.pem"

[otel.metrics_exporter.otlp-http]
endpoint = "https://otel.h-cloud.lan/v1/metrics"
protocol = "binary"

[otel.metrics_exporter.otlp-http.tls]
ca-certificate = "/Users/lkshrk/.local/share/certs/lan-ca.pem"

[tui]
session_picker_view = "dense"
status_line = [
	"model-with-reasoning",
	"context-used",
	"used-tokens",
	"project-name",
	"git-branch",
	"five-hour-limit",
	"weekly-limit",
]

[tui.keymap.editor]
insert_newline = ["shift-enter"]
kill_line_start = ["ctrl-u"]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

