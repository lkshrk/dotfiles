args = ["mcp", "start"]

[mcp_servers.CodeGraphContext.env]
ALLOW_DB_DELETION = "false"
CACHE_ENABLED = "true"
COMPLEXITY_THRESHOLD = "10"
DEBUG_LOGS = "false"
DEBUG_LOG_PATH = "/Users/lkshrk/mcp_debug.log"
DEFAULT_DATABASE = "falkordb"
ENABLE_APP_LOGS = "CRITICAL"
ENABLE_AUTO_WATCH = "false"
FALKORDB_PATH = "/Users/lkshrk/.codegraphcontext/global/db/falkordb"
FALKORDB_SOCKET_PATH = "/Users/lkshrk/.codegraphcontext/global/db/falkordb.sock"
IGNORE_DIRS = "node_modules,venv,.venv,env,.env,dist,build,target,out,.git,.idea,.vscode,__pycache__"
IGNORE_HIDDEN_FILES = "true"
IGNORE_TEST_FILES = "false"
INDEX_SOURCE = "true"
INDEX_VARIABLES = "true"
LIBRARY_LOG_LEVEL = "WARNING"
LOG_FILE_PATH = "/Users/lkshrk/.codegraphcontext/logs/cgc.log"
MAX_DEPTH = "unlimited"
MAX_FILE_SIZE_MB = "10"
PARALLEL_WORKERS = "4"
SCIP_INDEXER = "false"
SCIP_LANGUAGES = "python,typescript,go,rust,java"
SKIP_EXTERNAL_RESOLUTION = "false"

